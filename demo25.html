<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>title</title>
  </head>
  <body>
    <form type="action">
        <label for="form">Feedback Form</label>
        <br><br>
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Write your name">
        <br><br>
        <label for="email">Email: </label>
        <input type="email" id="email">
        <br><br>
        <label for="msg">Message: </label>
        <br>
        <textarea type="text" col="8" row="3"></textarea>
        <br>
        <input type="checkbox">
        <label for="sub">Subscribe?</label>
        <br><br>
        <label for="rate">Rate us out of 5:</label>
        <br>
        <input type="radio" name="rate" id="one" value="one">
        <label for="one">1</label>
        <br>
        <input type="radio" name="rate" id="two" value="two">
        <label for="two">2</label>
        <br>
        <input type="radio" name="rate" id="three" value="three">
        <label for="three">3</label>
        <br>
        <input type="radio" name="rate" id="four" value="four">
        <label for="four">4</label>
        <br>
        <input type="radio" name="rate" id="five" value="five">
        <label for="five">5</label>
        <br><br>
        <button type="submit">Submit</button>
    </form>
  </body>
</html>

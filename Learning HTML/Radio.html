<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>title</title>
  </head>
  <body>
    <form action="\server">
        <div>
        <input type="radio" name="fruit" id="apple" value="apple">
        <label for="apple">Apple</label>
        <input type="radio" name="fruit" id="bananna" value="bananna"/>
        <label for="bananna">Bananna</label>
        <input type="radio" id="mango" name="fruit" value="mango" checked/>
        <label for="mango">Mango</label>  
        </div>
        <br/>
        <div>
            <label for="subjects">Choose your Subjects: </label>
            <input type="checkbox" id="maths" name="subjects" value="maths"/>
            <label for="maths">Maths</label>
            <input type="checkbox" id="science" name="subjects" value="science"/>
            <label for="science">Science</label>
            <input type="checkbox" id="english" name="subjects" value="english" checked/>
            <label for="english">English</label>
        </div>
        <br/>
        <button>Submit</button>
    </form>
  </body>
</html>
